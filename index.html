<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Trade Calculator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="calculator">
    <h2>Pro Trade Calculator</h2>

    <!-- Symbol -->
    <label for="symbol">Trading Pair / Commodity</label>
    <input list="symbols" id="symbol" placeholder="Select Symbol">
    <datalist id="symbols">
        <!-- Forex -->
        <option value="EUR/USD">
        <option value="GBP/USD">
        <option value="USD/JPY">
        <option value="AUD/USD">
        <option value="USD/CHF">
        <option value="NZD/USD">
        <option value="USD/CAD">
        <!-- Commodities -->
        <option value="Gold (XAU/USD)">
        <option value="Silver (XAG/USD)">
        <option value="Crude Oil (WTI)">
        <option value="Brent Oil">
    </datalist>

    <!-- Side -->
    <label for="side">Side</label>
    <select id="side">
        <option value="buy">Buy</option>
        <option value="sell">Sell</option>
    </select>

    <!-- Entry -->
    <label for="entry">Entry Price</label>
    <input id="entry" type="number" placeholder="Entry Price">

    <!-- Stop Loss / Take Profit -->
    <div class="row">
        <div>
            <label for="stop">Stop Loss</label>
            <input id="stop" class="small-input" type="number" placeholder="Stop Loss">
        </div>
        <div>
            <label for="tp">Take Profit</label>
            <input id="tp" class="small-input" type="number" placeholder="Take Profit">
        </div>
    </div>

    <!-- Lot Size / Account Balance -->
    <div class="row">
        <div>
            <label for="lot">Lot Size</label>
            <input id="lot" class="small-input" type="number" placeholder="Lot Size">
        </div>
        <div>
            <label for="balance">Account Balance</label>
            <input id="balance" class="small-input" type="number" placeholder="Account Balance">
        </div>
    </div>

    <button class="calculate" onclick="calculate()">Calculate</button>

    <div id="output"></div>
</div>

<script src="app.js"></script>
</body>
</html>
